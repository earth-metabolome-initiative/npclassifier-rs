name: Coverage

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  NPCLASSIFIER_SKIP_WEB_WORKER_BUILD: "1"

jobs:
  coverage:
    name: Product Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust components
        run: |
          rustup default stable
          rustup component add llvm-tools-preview

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock', '.github/workflows/coverage.yml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@cargo-tarpaulin

      - name: Generate coverage report
        run: |
          cargo tarpaulin \
            --engine llvm \
            --workspace \
            --exclude npclassifier-train \
            --exclude npclassifier-web-worker \
            --features npclassifier-core/runner \
            --out Xml \
            --timeout 120

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: cobertura.xml
          flags: product
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
