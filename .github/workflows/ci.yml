name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  workspace:
    name: Workspace
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust components
        run: |
          rustup default stable
          rustup component add rustfmt clippy
          rustup target add wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check workspace
        run: cargo check --workspace

      - name: Check core all features
        run: cargo check -p npclassifier-core --all-features

      - name: Test core
        run: cargo test -p npclassifier-core --all-features

      - name: Lint core
        run: cargo clippy -p npclassifier-core --all-features -- -D warnings

      - name: Test cargo-npc
        run: cargo test -p cargo-npc

      - name: Lint cargo-npc
        run: cargo clippy -p cargo-npc -- -D warnings

  web:
    name: Web
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust components
        run: |
          rustup default stable
          rustup component add clippy
          rustup target add wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-

      - name: Check web release build
        run: cargo check --release -p npclassifier-web --target wasm32-unknown-unknown

      - name: Test web
        run: cargo test -p npclassifier-web

      - name: Lint web
        run: cargo clippy -p npclassifier-web --target wasm32-unknown-unknown -- -D warnings
